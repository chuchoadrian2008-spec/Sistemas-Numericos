<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio - Sistemas Numéricos</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            color: white;
            text-align: center;
        }

        .contenedor {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
        }

        h1 {
            font-size: 80px;
            margin-bottom: 30px;
            color: #38bdf8;
        }

        .boton {
            width: 400px;
            Height: 40px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .boton:hover {
            background-color: #1d4ed8;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
        }

        .footer a {
            color: #38bdf8;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>

    <script>
        function continuar() {
            window.location.href = "menu.html";
        }
    </script>

</head>
<body>

<div class="contenedor">
<center>
    <h1>Sistemas Numéricos</h1>

 
    <button class="boton" onclick="continuar()">Continuar</button>
</center>
</div>

<div class="footer">
    <p>
        Síguenos en 
        <a href="https://www.facebook.com/share/1GYYVwiDpr/" target="_blank">Facebook</a>
    </p>
</div>

</body>
</html>
